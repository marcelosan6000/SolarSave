<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarSave Pro - Calcula y Ahorra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .slider { appearance: none; width: 100%; height: 6px; background: #e2e8f0; outline: none; border-radius: 10px; }
        .slider::-webkit-slider-thumb { appearance: none; width: 22px; height: 22px; background: #10b981; cursor: pointer; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-900 antialiased">

    <nav class="bg-white border-b border-slate-200 py-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 flex justify-between items-center">
            <span class="text-2xl font-black text-emerald-600 tracking-tighter">SolarSave.</span>
            <a href="#contacto" class="bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold text-sm hover:bg-emerald-700 transition">Presupuesto Gratis</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-12">
        <div class="grid lg:grid-cols-2 gap-12 mb-20">
            <div class="space-y-8">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                    <div class="flex justify-between items-start mb-10">
                        <h2 class="text-xl font-extrabold">Calculadora</h2>
                        <div class="text-right">
                            <button onclick="obtenerUbicacion()" class="text-[10px] font-black bg-slate-100 text-slate-600 px-3 py-2 rounded-lg hover:bg-emerald-100 hover:text-emerald-700 transition tracking-widest uppercase mb-2">📍 GPS Auto</button>
                            <div id="coordsBox" class="hidden text-[9px] font-mono text-slate-400 bg-slate-50 px-2 py-1 rounded border border-slate-100">
                                Lat: <span id="lat">0</span> | Lon: <span id="lon">0</span>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-12">
                        <div>
                            <div class="flex justify-between mb-4">
                                <span class="text-sm font-bold text-slate-500 uppercase tracking-widest">Gasto Mensual</span>
                                <span class="text-2xl font-black text-emerald-600"><span class="symbol">$</span><span id="labelGasto">150</span></span>
                            </div>
                            <input type="range" min="20" max="2000" value="150" class="slider" id="inputGasto">
                        </div>
                        <div>
                            <div class="flex justify-between mb-4 text-sm">
                                <span class="text-sm font-bold text-slate-500 uppercase tracking-widest">Radiación Solar</span>
                                <span class="text-2xl font-black text-emerald-600"><span id="labelSol">4.5</span> <small class="text-slate-400 font-normal">HSP</small></span>
                            </div>
                            <input type="range" min="1" max="8" step="0.1" value="4.5" class="slider" id="inputSol">
                        </div>
                        <div class="pt-4 border-t border-slate-100">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest block mb-3 text-center">Selecciona tu moneda</label>
                            <select id="currencySelector" onchange="calcular()" class="w-full bg-slate-50 border border-slate-200 text-sm font-bold rounded-xl px-4 py-3 outline-none text-center">
                                <option value="USD" data-symbol="$" data-kwh="0.15">Dólar (USD) - 0.15/kWh</option>
                                <option value="EUR" data-symbol="€" data-kwh="0.25">Euro (EUR) - 0.25/kWh</option>
                                <option value="MXN" data-symbol="$" data-kwh="3.50">Peso Mexicano (MXN) - 3.50/kWh</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-slate-900 p-10 rounded-[2.5rem] shadow-2xl text-white relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-emerald-500/20 rounded-full blur-3xl"></div>
                    <p class="text-emerald-400 text-[10px] font-black uppercase tracking-[0.2em] mb-4">Ahorro proyectado (25 años)</p>
                    <div class="flex items-baseline gap-2 mb-10">
                        <span class="text-4xl font-light text-emerald-500 symbol">$</span>
                        <span class="text-7xl font-black tracking-tighter" id="resAhorroTotal">0</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 border border-white/10 p-5 rounded-3xl">
                            <span class="block text-slate-400 text-[10px] font-bold uppercase mb-1">Recuperación</span>
                            <span class="text-2xl font-bold"><span id="resROI">0</span> <small class="text-sm font-normal opacity-50">años</small></span>
                        </div>
                        <div class="bg-white/5 border border-white/10 p-5 rounded-3xl">
                            <span class="block text-slate-400 text-[10px] font-bold uppercase mb-1">Ahorro Anual</span>
                            <span class="text-2xl font-bold"><span class="symbol">$</span><span id="resAhorroAnual">0</span></span>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-200">
                    <canvas id="graficaAhorro" height="160"></canvas>
                </div>
            </div>
        </div>

        </main>

    <script>
        const inputGasto = document.getElementById('inputGasto');
        const inputSol = document.getElementById('inputSol');
        const currencySelector = document.getElementById('currencySelector');
        // Referencias para las coordenadas
        const coordsBox = document.getElementById('coordsBox');
        const latSpan = document.getElementById('lat');
        const lonSpan = document.getElementById('lon');
        let chart;

        async function obtenerUbicacion() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;

                    // Mostramos el cuadro de coordenadas en la UI
                    coordsBox.classList.remove('hidden');
                    latSpan.innerText = lat.toFixed(4);
                    lonSpan.innerText = lon.toFixed(4);

                    const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=shortwave_radiation_sum&timezone=auto`);
                    const data = await res.json();
                    const hsp = (data.daily.shortwave_radiation_sum[0] / 3.6).toFixed(1);
                    inputSol.value = hsp;
                    calcular();
                });
            }
        }

        function calcular() {
            const gasto = parseFloat(inputGasto.value);
            const sol = parseFloat(inputSol.value);
            const opt = currencySelector.options[currencySelector.selectedIndex];
            const symbol = opt.dataset.symbol;
            const precioKWh = parseFloat(opt.dataset.kwh);

            document.querySelectorAll('.symbol').forEach(el => el.innerText = symbol);
            document.getElementById('labelGasto').innerText = gasto.toLocaleString();
            document.getElementById('labelSol').innerText = sol;

            const capacidadSugeridaKw = (gasto / (30 * sol * precioKWh));
            const costoInstalacion = capacidadSugeridaKw * 1100; 
            const ahorroAnual = gasto * 12 * 0.95; 
            const roi = costoInstalacion / ahorroAnual;

            document.getElementById('resAhorroTotal').innerText = Math.round(ahorroAnual * 25).toLocaleString();
            document.getElementById('resAhorroAnual').innerText = Math.round(ahorroAnual).toLocaleString();
            document.getElementById('resROI').innerText = roi.toFixed(1);

            renderChart(ahorroAnual, costoInstalacion);
        }

        function renderChart(ahorro, costo) {
            const ctx = document.getElementById('graficaAhorro').getContext('2d');
            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['0', '5', '10', '15', '20', '25'],
                    datasets: [{
                        label: 'Retorno Neto',
                        data: [0, 5, 10, 15, 20, 25].map(y => (ahorro * y) - costo),
                        borderColor: '#10b981',
                        borderWidth: 4,
                        pointRadius: 0,
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true, tension: 0.4
                    }]
                },
                options: { 
                    plugins: { legend: { display: false } },
                    scales: { y: { display: false }, x: { grid: { display: false } } }
                }
            });
        }

        [inputGasto, inputSol].forEach(i => i.addEventListener('input', calcular));
        calcular();
    </script>
</body>
</html>
